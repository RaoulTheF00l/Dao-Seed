<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Dao Seed</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="game-container">
    <header class="game-header">
      <h1>Dao Seed</h1>
      <p class="subtitle">A tiny cultivation text adventure</p>
    </header>

    <section class="panel">
      <h2>Status</h2>

      <div id="stats" class="stats-list">
        <!-- JavaScript will place the player's stats here -->
      </div>
    </section>

    <section class="panel">
      <h2>Actions</h2>

      <div class="actions">
        <button id="cultivateButton" type="button">Cultivate</button>
        <button id="meditateButton" type="button">Meditate</button>
        <button id="workButton" type="button">Work</button>
        <button id="exploreButton" type="button">Explore</button>
        <button id="breakthroughButton" type="button">Attempt Breakthrough</button>
      </div>
    </section>

    <section class="panel">
      <h2>Log</h2>

      <div id="log" class="log">
        <p>Your path begins beneath a quiet sky.</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
